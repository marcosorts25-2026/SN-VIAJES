<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordFill" x1="96" y1="74" x2="872" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="138" y1="42" x2="846" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="112" y="34" width="756" height="9" rx="4.5" fill="url(#accent)" opacity="0.92"/>
  <rect x="112" y="317" width="756" height="9" rx="4.5" fill="url(#accent)" opacity="0.55"/>

  <g filter="url(#softShadow)" transform="skewX(-10)">
    <text x="88" y="156" font-family="Arial Black, Impact, sans-serif" font-size="116" font-weight="900" letter-spacing="4" fill="url(#wordFill)" stroke="#020617" stroke-width="11" paint-order="stroke fill">SOMOS</text>
    <text x="252" y="278" font-family="Arial Black, Impact, sans-serif" font-size="126" font-weight="900" letter-spacing="4" fill="url(#wordFill)" stroke="#020617" stroke-width="11" paint-order="stroke fill">NOCHE</text>
  </g>

  <text x="490" y="346" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="8" fill="#e2e8f0">TRANSPORTE</text>
</svg>
